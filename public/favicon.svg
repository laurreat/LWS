<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#grad1)"/>
  <g transform="translate(16,16)">
    <!-- Microphone body -->
    <rect x="-3" y="-8" width="6" height="12" rx="3" fill="white"/>
    <!-- Microphone base -->
    <rect x="-5" y="4" width="10" height="2" rx="1" fill="white"/>
    <!-- Microphone stand -->
    <rect x="-1.5" y="6" width="3" height="4" fill="white"/>
    <!-- Sound waves -->
    <path d="M 8 -4 Q 12 -4 12 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 8 4 Q 12 4 12 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>